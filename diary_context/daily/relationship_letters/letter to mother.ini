Dear

Mình là Ngọc Lê - 30 tuổi (sinh năm 93), người Tây Ninh, đang sinh sống và làm việc tại Q7, Hồ Chí Minh. Hiện mình đang làm Product Manager cho 1 FinTech tại Hồ Chí Minh. Mình đã kết hôn 2 năm với bạn trai quen nhau 9 năm, và vợ chồng mình đang xem xét việc có con trong vòng 5 năm tới. Tuy nhiên, mình hiện 90% là không muốn có con (child-free) với fun-fact là mình không thích trẻ con dựa theo những lần tiếp xúc với cháu trong nhà. Sau khi rà soát các yếu tố ảnh hưởng đến mức độ mong muốn có con, mình thấy có khả năng những vấn đề trong mối quan hệ giữa mẹ của mình và mình (my mom - me) ảnh hưởng lớn đến xu hướng quyết định và cảm xúc hiện tại của mình về việc có con. Vì vậy, mình mong muốn được tư vấn tâm lý. 

Hiện tại mình đang tìm hiểu các sự lựa chọn chuyên gia tư vấn tâm lý. Vì vậy, nếu bạn xem xét nhận ca tư vấn của mình, vui lòng cho mình biết thêm thông tin về:

1. Kinh nghiệm chuyên môn có liên quan đến trường hợp của mình
2. Hướng tiếp cận đề xuất, dựa trên thông tin đã cung cấp
3. Nhận xét của các khách hàng (ưu tiên các trường hợp tương tự case của mình)

Cảm ơn, hy vọng nhận được phản hồi từ bạn.